version: 2
updates:
  - package-ecosystem: pip
    open-pull-requests-limit: 0
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "main"
    commit-message:
      prefix: "ci(py-deps)"
  - package-ecosystem: github-actions
    open-pull-requests-limit: 0
    directory: ".github/workflows"
    schedule:
      interval: "daily"
    target-branch: "main"
    commit-message:
      prefix: "ci(workflow-deps)"
